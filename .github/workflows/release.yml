name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/release.yml"
      - "CHANGELOG.md"
      - "Cargo.lock"
      - "crates/girelay/Cargo.toml"
      - "packaging/**"
      - "scripts/package-check.sh"
      - "scripts/package-deb.sh"
      - "scripts/package-release.sh"
      - "scripts/release-check.sh"
      - "scripts/version-check.sh"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: bash scripts/release-check.sh
        env:
          GIRELAY_RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

  build-artifacts:
    needs: release-check
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            deb_arch: amd64
            bin: girelay
            archive: girelay-linux-x86_64.tar.gz
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            deb_arch: arm64
            bin: girelay
            archive: girelay-linux-aarch64.tar.gz
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            bin: girelay
            archive: girelay-macos-x86_64.tar.gz
            deb_arch: ""
          - name: macos-aarch64
            os: macos-15
            target: aarch64-apple-darwin
            bin: girelay
            archive: girelay-macos-aarch64.tar.gz
            deb_arch: ""
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: girelay.exe
            archive: girelay-windows-x86_64.zip
            deb_arch: ""
    steps:
      - uses: actions/checkout@v4
      - name: Install musl toolchain
        if: matrix.deb_arch != ''
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Test release target
        if: runner.os != 'Windows'
        shell: bash
        run: cargo test --release --target "${{ matrix.target }}"
      - name: Compile release tests
        if: runner.os == 'Windows'
        shell: bash
        run: cargo test --release --target "${{ matrix.target }}" --no-run
      - name: Build and execute release binary
        shell: bash
        run: |
          cargo build --release --target "${{ matrix.target }}"
          "target/${{ matrix.target }}/release/${{ matrix.bin }}" --version
      - name: Verify static Linux binary
        if: matrix.deb_arch != ''
        shell: bash
        run: |
          if readelf --program-headers "target/${{ matrix.target }}/release/${{ matrix.bin }}" | grep -q INTERP; then
            echo "Linux release binary unexpectedly requires a dynamic interpreter." >&2
            exit 1
          fi
      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"
          cp README.md LICENSE dist/
          cd dist
          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            7z a "${{ matrix.archive }}" "${{ matrix.bin }}" README.md LICENSE
          else
            tar -czf "${{ matrix.archive }}" "${{ matrix.bin }}" README.md LICENSE
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
            sha256sum -c "${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
            shasum -a 256 -c "${{ matrix.archive }}.sha256"
          fi
      - name: Verify packaged archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/verify
          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            7z x "dist/${{ matrix.archive }}" "-odist/verify"
          else
            tar -xzf "dist/${{ matrix.archive }}" -C dist/verify
          fi
          test -s dist/verify/README.md
          test -s dist/verify/LICENSE
          "dist/verify/${{ matrix.bin }}" --version
      - name: Package Debian artifact
        if: matrix.deb_arch != ''
        shell: bash
        env:
          GIRELAY_DEB_MAINTAINER: ${{ github.repository_owner }} <${{ github.repository_owner }}@users.noreply.github.com>
        run: bash scripts/package-deb.sh build "${{ matrix.target }}" "${{ matrix.deb_arch }}"
      - name: Install Debian artifact
        if: matrix.deb_arch != ''
        shell: bash
        run: |
          sudo dpkg -i dist/*.deb
          /usr/bin/girelay --version
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
            dist/*.deb
            dist/*.deb.sha256

  github-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: girelay ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist/*
